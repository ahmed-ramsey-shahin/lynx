name: Build and Publish Redirection Service

on:
  push:
    branches:
      - main
    paths:
      - 'Lynx.RedirectionService/**'
      - '.github/workflows/redirection-service.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./Lynx.RedirectionService
          file: ./Lynx.RedirectionService/Dockerfile
          push: true
          tags: ahmedramseyshahin/redirection-lynx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
