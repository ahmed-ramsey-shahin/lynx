services:
  rabbitmq-setup:
    image: curlimages/curl:latest
    container_name: rabbitmq-setup
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - lynx-net
    env_file: .env
    command: >
      sh -c '
        sleep 10;

        # 1. Identity Service (Write only)
        curl -s -u "$$RABBITMQ_USERNAME:$$RABBITMQ_PASSWORD" -X PUT http://rabbitmq:15672/api/users/$$IDENTITY_SVC_USER -d "{\"password\":\"$$IDENTITY_SVC_PASS\",\"tags\":\"\"}";
        curl -s -u "$$RABBITMQ_USERNAME:$$RABBITMQ_PASSWORD" -X PUT http://rabbitmq:15672/api/permissions/%2F/$$IDENTITY_SVC_USER -d "{\"configure\":\"^none\$$\",\"write\":\"^\$$\",\"read\":\"^none\$$\"}";

        # 2. Redirection Service (Read DeletedUsers, Write to ShortLinkVisits)
        curl -s -u "$$RABBITMQ_USERNAME:$$RABBITMQ_PASSWORD" -X PUT http://rabbitmq:15672/api/users/$$REDIRECTION_SVC_USER -d "{\"password\":\"$$REDIRECTION_SVC_PASS\",\"tags\":\"\"}";
        curl -s -u "$$RABBITMQ_USERNAME:$$RABBITMQ_PASSWORD" -X PUT http://rabbitmq:15672/api/permissions/%2F/$$REDIRECTION_SVC_USER -d "{\"configure\":\"^none\$$\",\"write\":\"^\$$\",\"read\":\"^DeletedUsers\$$\"}";

        # 3. Analytics Service (Read DeletedUsers, Read ShortLinkVisits)
        curl -s -u "$$RABBITMQ_USERNAME:$$RABBITMQ_PASSWORD" -X PUT http://rabbitmq:15672/api/users/$$ANALYTICS_SVC_USER -d "{\"password\":\"$$ANALYTICS_SVC_PASS\",\"tags\":\"\"}";
        curl -s -u "$$RABBITMQ_USERNAME:$$RABBITMQ_PASSWORD" -X PUT http://rabbitmq:15672/api/permissions/%2F/$$ANALYTICS_SVC_USER -d "{\"configure\":\"^none\$$\",\"write\":\"^none\$$\",\"read\":\"^(ShortLinkVisits|DeletedUsers)\$$\"}";

        echo "All microservice permissions secured successfully!";
      '
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - lynx-net
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
  analytics-db:
    image: influxdb:2
    container_name: analytics-db
    ports:
      - "8086:8086"
    volumes:
      - analytics-db-data:/var/lib/influxdb2
      - analytics-db-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_ORG=lynx
      - DOCKER_INFLUXDB_INIT_BUCKET=lynx-bucket
      - DOCKER_INFLUXDB_INIT_USERNAME=${ANALYTICS_DB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${ANALYTICS_DB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${ANALYTICS_DB_TOKEN}
    restart: unless-stopped
    networks:
      - lynx-net
  users-db:
    image: mongodb/mongodb-community-server:latest
    container_name: users-db
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${USERS_DB_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${USERS_DB_PASSWORD}
    volumes:
      - users-db-data:/data/db
    restart: unless-stopped
    networks:
       - lynx-net

volumes:
  analytics-db-data:
  analytics-db-config:
  users-db-data:
  rabbitmq-data:

networks:
  lynx-net:
    driver: bridge
