openapi: 3.1.0
info:
  version: 1.0.0
  title: AnalyticsService - Analytics API
  description: Asynchronous click tracking and telemetry service for Lynx. Handles background event processing, geospatial data aggregation, and comprehensive time-series metrics delivery.
servers:
  - url: http://localhost:8082
    description: Local Development Gateway
paths:
  /api/analytics/{shortKey}/details:
    get:
      summary: Get detailed analytics
      description: Retrieves comprehensive, array-based metrics (time-series, demographics, devices) for building dashboard charts.
      operationId: getAnalyticsDetails
      tags:
        - Dashboard
      security:
        - bearerAuth: []
      parameters:
        - name: shortKey
          in: path
          required: true
          description: The unique alias of the short link.
          schema:
            type: string
            minLength: 4
            maxLength: 30
          example: 'git-readme'
        - name: timeframe
          in: query
          required: false
          description: Optional filter for the data timeframe (e.g., 7d, 30d, 1m, 3y, all). Defaults to 30d.
          schema:
            type: string
            example: '5m'
      responses:
        '200':
          description: OK - Detailed analytics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsDetailsResponse'
        '404':
          description: Not Found - Short link does not exist
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description:  Unauthorized - Token is missing or invalid
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden - You do not have permission to view this resource
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/analytics/{shortKey}/summary:
    get:
      summary: Get summary of analytics
      operationId: getAnalyticsSummary
      tags:
        - dashboard
      security:
        - bearerAuth: []
      parameters:
        - name: shortKey
          in: path
          required: true
          description: The unique alias of the short link.
          schema:
            type: string
            minLength: 4
            maxLength: 30
          example: 'git-readme'
      responses:
        '200':
          description: OK - Summary of analytics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummaryResponse'
        '404':
          description: Not Found - Short link does not exist
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description:  Unauthorized - Token is missing or invalid
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden - You do not have permission to view this resource
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    Metric:
      type: object
      properties:
        name:
          type: string
          description: The name of the metric
          example: Windows OS
        clicks:
          type: integer
          description: The number of clicks
          example: 15420
      required:
        - name
        - clicks
    TimeSeriesPoint:
      type: object
      properties:
        date:
          type: string
          format: date
          description: The specific date for this data point.
          example: "2026-05-19"
        clicks:
          type: integer
          description: The number of clicks
          example: 15420
      required:
        - date
        - clicks
    AnalyticsDetailsResponse:
      type: object
      properties:
        timeSeries:
          type: array
          description: A chronological list of clicks over time for line charts
          items:
            $ref: '#/components/schemas/TimeSeriesPoint'
        operatingSystems:
          type: array
          description: Clicks grouped by operating system for pie charts.
          items:
            $ref: '#/components/schemas/Metric'
        browsers:
          type: array
          description: Clicks grouped by web browser for pie charts.
          items:
            $ref: '#/components/schemas/Metric'
        deviceTypes:
          type: array
          description: Clicks grouped by device type (Mobile, Desktop, Tablet) for pie charts.
          items:
            $ref: '#/components/schemas/Metric'
        countries:
          type: array
          description: Clicks grouped by country of origin for map visuals.
          items:
            $ref: '#/components/schemas/Metric'
        referrers:
          type: array
          description: Clicks grouped by the source of the traffic for pie charts.
          items:
            $ref: '#/components/schemas/Metric'
      required:
        - timeSeries
        - operatingSystems
        - browsers
        - deviceTypes
        - countries
        - referrers
    AnalyticsSummaryResponse:
      type: object
      properties:
        totalClicks:
          type: integer
          description: The absolute total number of times the link has been clicked.
          example: 15420
        uniqueVisitors:
          type: integer
          description: The number of distinct users (based on IP hash) who clicked the link.
          example: 8430
        topOs:
          type: string
          description: The most frequently used operating system.
          example: "Linux"
        topDeviceType:
          type: string
          description: The most frequently used device type.
          example: "Desktop"
        topBrowser:
          type: string
          description: The most frequently used browser.
          example: "Chrome"
        topReferrer:
          type: string
          description: The most common traffic source.
          example: "t.co"
        topCountry:
          type: string
          description: The country with the highest number of clicks.
          example: "Egypt"
      required:
        - totalClicks
        - uniqueVisitors
        - topOs
        - topDeviceType
        - topBrowser
        - topReferrer
        - topCountry
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          example: https://tools.ietf.org/html/rfc7231#section-6.5.1
          description: A URI reference that identifies the problem type.
        title:
          type: string
          example: One or more validation errors occurred.
          description: A short, human-readable summary of the problem.
        status:
          type: integer
          example: 400
          description: The HTTP status code generated by the origin server.
        detail:
          type: string
          example: No analytics found.
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          example: /api/analytics/git-readme/summary
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
