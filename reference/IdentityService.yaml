openapi: 3.1.0
info:
  version: 1.0.0
  title: IdentityService - Identity API
  description: Centralized authentication and user management service for Lynx. Handles user registration, secure credential verification, and stateless JWT issuance.
servers:
  - url: http://localhost:8081
    description: Local Development Gateway
paths:
  /api/auth/activations:
    post:
      summary: Activate a user account
      description: Consumes the URL-safe activation token sent to the user's email to activate their account.
      operationId: activateUser
      tags:
        - User management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivateUserRequest'
      responses:
        '204':
          description: No Content - Account activated successfully
        '400':
          description: Bad Request - Invalid input or the activation code has expired
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found - The user tied to this token could not be found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/auth/password-resets:
    post:
      summary: Reset a password using an OTP
      description: Consumes the 6-digit code sent to the user's email to assign a new password.
      operationId: resetPassword
      tags:
        - Password recovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: No Content - Password reset successfully
        '400':
          description: Bad Request - Invalid input, or the OTP is incorrect/expired.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/auth/password-reset-requests:
    post:
      summary: Request a password reset
      description: Initiates the password recovery process. Always returns a 202 Accepted to prevent user enumeration.
      operationId: forgotPassword
      tags:
        - Password recovery
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: A client-generated UUID used to safely retry requests without creating duplicate user.
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '202':
          description: Accepted - The request was processed successfully (no data returned for security)
        '400':
          description: Bad Request - Invalid Input (e.g. malformed email)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/auth/users/{userId}/deletions:
    post:
      summary: Deletes a user and all the short links they created
      operationId: deleteUser
      tags:
        - User management
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: The unique identifier of the user.
          schema:
            type: string
            example: "123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteUserRequest'
      responses:
        '204':
          description: No Content - Username deleted successfully
        '400':
          description: Bad Request - Invalid input (e.g. malformed password)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description:  Unauthorized - Token is missing or invalid
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden - You do not have permission to delete this user
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found - No user was found with this ID
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/auth/users/{username}:
    get:
      summary: Returns a user's data
      operationId: getUser
      tags:
        - User management
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          description: The unique username of the user.
          schema:
            type: string
            example: "lynx_user"
      responses:
        '200':
          description: OK - User found and returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponse'
        '401':
          description:  Unauthorized - Token is missing or invalid
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden - You do not have permission to view this user's data
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found - No user was found with this ID
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/auth/users/{userId}/username:
    put:
      summary: Change username
      operationId: changeUsername
      tags:
        - User management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeUsernameRequest'
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: The unique identifier of the user.
          schema:
            type: string
            example: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        '204':
          description: No Content - Username updated successfully
        '400':
          description: Bad Request - Invalid input (e.g. malformed username)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description:  Unauthorized - Token is missing or invalid
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden - You do not have permission to change this user's data
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found - No user was found with this ID
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict - Username already in use
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/auth/users/{userId}/password:
    put:
      summary: Change user password
      operationId: changeUserPassword
      tags:
        - User management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: The unique identifier of the user.
          schema:
            type: string
            example: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        '204':
          description: No Content - Password updated successfully
        '400':
          description: Bad Request - Invalid input (e.g. malformed password)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description:  Unauthorized - Token is missing or invalid
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden - You do not have permission to change this user's data
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found - No user was found with this ID
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/auth/tokens:
    put:
      summary: Refreshes an access token
      operationId: refreshToken
      tags:
        - User authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: OK - Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Bad Request - Invalid input (e.g. malformed token)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description:  Unauthorized - A token is invalid
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden - The refresh token is valid but can not be used
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      summary: Login
      operationId: login
      tags:
        - User authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK - Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Bad Request - Invalid input (e.g. malformed password)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized - Invalid Login credentials
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/auth/users:
    post:
      summary: Creates a user
      operationId: createUser
      tags:
        - User Management
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: A client-generated UUID used to safely retry requests without creating duplicate user.
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created - Successfully created the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        '400':
          description: Bad Request - Invalid input (e.g. malformed email)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict - A conflict happened with another user (e.g. email already in use)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    ActivateUserRequest:
      type: object
      properties:
        activationCode:
          type: string
          description: The URL-safe hex string activation code sent to the user's email.
          example: "3f8a0b9e8c7d6f5a4b3c2d1e0f9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d3e2f1"
      required:
        - code
    ResetPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: my_email@lynx.com
        code:
          type: string
          description: The 6-digit One-Time Password sent to the user's email.
          minLength: 6
          maxLength: 6
          example: "849201"
        newPassword:
          type: string
          example: VerySecure@NewPassword123
          minLength: 8
          maxLength: 128
      required:
        - email
        - code
        - newPassword
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: my_email@lynx.com
      required:
        - email
    DeleteUserRequest:
      type: object
      properties:
        password:
          type: string
          example: VerySecure@Password123
          minLength: 8
          maxLength: 128
        hasConfirmed:
          type: boolean
          description: A flag to check that the user confirmed to delete all the short links he created and their analytics
      required:
        - password
        - hasConfirmed
    GetUserResponse:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          example: john_doe
        email:
          type: string
          format: email
          example: my_email@lynx.com
      required:
        - username
        - email
    RefreshTokenRequest:
      type: object
      properties:
        expiredAccessToken:
          type: string
          description: The stateless JWT used to authenticate requests to other microservices.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          description: A long-lived, opaque token used to acquire a new access token when the current one expires.
          example: "d2948b8c-b026-46c5-a13f-84614a1fa342"
      required:
        - expiredAccessToken
        - refreshToken
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: The stateless JWT used to authenticate requests to other microservices.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          description: A long-lived, opaque token used to acquire a new access token when the current one expires.
          example: "d2948b8c-b026-46c5-a13f-84614a1fa342"
        expiresAt:
          type: string
          format: date-time
          description: The exact UTC timestamp when the access token will expire.
          example: "2026-05-19T20:15:30Z"
      required:
        - accessToken
        - refreshToken
        - expiresAt
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: john_doe
          minLength: 3
          maxLength: 30
        password:
          type: string
          example: VerySecure@Password123
          minLength: 8
          maxLength: 128
      required:
        - username
        - password
    ChangePasswordRequest:
      type: object
      properties:
        newPassword:
          type: string
          example: VerySecure@NewPassword123
          minLength: 8
          maxLength: 128
        oldPassword:
          type: string
          example: VerySecure@Password123
          minLength: 8
          maxLength: 128
      required:
        - newPassword
        - oldPassword
    ChangeUsernameRequest:
      type: object
      properties:
        username:
          type: string
          example: john_doe
          minLength: 3
          maxLength: 30
        password:
          type: string
          example: VerySecure@Password123
          minLength: 8
          maxLength: 128
      required:
        - username
        - password
    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
          example: john_doe
          minLength: 3
          maxLength: 30
        password:
          type: string
          example: VerySecure@Password123
          minLength: 8
          maxLength: 128
        email:
          type: string
          format: email
          example: my_email@lynx.com
      required:
        - username
        - password
        - email
    CreateUserResponse:
      type: object
      properties:
        id:
          type: string
          example: "123e4567-e89b-12d3-a456-426614174000"
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          example: https://tools.ietf.org/html/rfc7231#section-6.5.1
          description: A URI reference that identifies the problem type.
        title:
          type: string
          example: One or more validation errors occurred.
          description: A short, human-readable summary of the problem.
        status:
          type: integer
          example: 400
          description: The HTTP status code generated by the origin server.
        detail:
          type: string
          example: The username field cannot contain spaces.
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          example: /api/auth/users
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
