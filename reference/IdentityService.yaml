openapi: 3.1.0
info:
  version: 1.0.0
  title: IdentityService - Identity API
  description: Centralized authentication and user management service for Lynx. Handles user registration, secure credential verification, and stateless JWT issuance.
servers:
  - url: http://localhost:8081
    description: Local Development Gateway
paths:
  /api/auth/login:
    post:
      summary: Login
      operationId: login
      tags:
        - User authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK - Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Bad Request - Invalid input (e.g. malformed password)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized - Invalid Login credentials
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/auth/register:
    post:
      summary: Creates a user
      operationId: createUser
      tags:
        - User Management
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: A client-generated UUID used to safely retry requests without creating duplicate user.
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created - Successfully created the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        '400':
          description: Bad Request - Invalid input (e.g. malformed email)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict - A conflict happened with another user (e.g. email already in use)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: The stateless JWT used to authenticate requests to other microservices.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          description: A long-lived, opaque token used to acquire a new access token when the current one expires.
          example: "d2948b8c-b026-46c5-a13f-84614a1fa342"
        expiresAt:
          type: string
          format: date-time
          description: The exact UTC timestamp when the access token will expire.
          example: "2026-05-19T20:15:30Z"
      required:
        - accessToken
        - refreshToken
        - expiresAt
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: john_doe
          minLength: 3
          maxLength: 30
        password:
          type: string
          example: VerySecure@Password123
          minLength: 8
          maxLength: 128
      required:
        - username
        - password
    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
          example: john_doe
          minLength: 3
          maxLength: 30
        password:
          type: string
          example: VerySecure@Password123
          minLength: 8
          maxLength: 128
        email:
          type: string
          format: email
          example: my_email@lynx.com
      required:
        - username
        - password
        - email
    CreateUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          example: https://tools.ietf.org/html/rfc7231#section-6.5.1
          description: A URI reference that identifies the problem type.
        title:
          type: string
          example: One or more validation errors occurred.
          description: A short, human-readable summary of the problem.
        status:
          type: integer
          example: 400
          description: The HTTP status code generated by the origin server.
        detail:
          type: string
          example: The username field cannot contain spaces.
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          example: /api/auth/register
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
