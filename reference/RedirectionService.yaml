openapi: 3.1.0
info:
  version: 1.0.0
  title: RedirectionService - Redirection API
  description: High-performance URL redirection and short link generation service
servers:
  - url: http://localhost:8080
    description: Local Development Gateway
paths:
  /{ShortKey}:
    get:
      summary: Redirect to the original long URL
      description: Resolves the short key and returns a 302 redirected. This endpoint is public and tracks analytics asynchronously.
      operationId: RedirectToLongUrl
      tags:
        - Redirection
      parameters:
        - name: ShortKey
          in: path
          required: true
          description: The unique token/alias generated for the long URL.
          schema:
            type: string
          example: "git-readme"
      responses:
        '302':
          description: Found - Redirecting to the target long URL.
          headers:
            Location:
              description: The actual destination URL.
              schema:
                type: string
                format: uri
              example: "https://github.com/git/git/blob/master/README.md"
        '404':
          description: Not Found - Short link does not exist or has expired
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/urls/{ShortKey}:
    delete:
      summary: Deletes a shortened URL
      operationId: DeleteShortUrl
      tags:
        - Link Management
      security:
        - bearerAuth: []
      parameters:
        - name: ShortKey
          in: path
          required: true
          description: The unique alias of the URL to delete.
          schema:
            type: string
            minLength: 4
            maxLength: 30
          example: 'git-readme'
      responses:
        '204':
          description: No Content - Successfully deleted the short URL.
        '400':
          description: Bad Request - Invalid short URL
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description:  Unauthorized - Token is missing or invalid
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden - You do not have permission to delete this link
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found - Short link does not exist
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/urls:
    post:
      summary: Creates a shortened URL
      operationId: createShortUrl
      tags:
        - Link Management
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: A client-generated UUID used to safely retry requests without creating duplicate short links.
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUrlRequest'
      responses:
        '201':
          description: Created - Successfully created the short URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUrlResponse'
        '400':
          description: Bad Request - Invalid input (e.g. malformed URL)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized - Token is missing or invalid
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict - Custom alias already in use
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    CreateUrlRequest:
      type: object
      required:
        - longUrl
      properties:
        longUrl:
          type: string
          format: uri
          example: https://github.com/git/git/blob/master/README.md
        customAlias:
          type: string
          example: git-readme
          description: Optional custom short string
        expiresInDays:
          type: integer
          example: 30
          description: Number of days until the link expires
    CreateUrlResponse:
      type: object
      properties:
        shortKey:
          type: string
          example: git-readme
        shortUrl:
          type: string
          format: uri
          example: http://localhost:8080/git-readme
        expiresAt:
          type: string
          format: date-time
          example: '2026-05-18T21:40:51.8822655+00:00'
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          example: https://tools.ietf.org/html/rfc7231#section-6.5.1
          description: A URI reference that identifies the problem type.
        title:
          type: string
          example: One or more validation errors occurred.
          description: A short, human-readable summary of the problem.
        status:
          type: integer
          example: 400
          description: The HTTP status code generated by the origin server.
        detail:
          type: string
          example: The customAlias field cannot contain spaces.
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          example: /api/urls
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
